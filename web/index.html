<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Sync Engine</title>
    <meta name="description" content="Mirror images from Docker Hub, GHCR, GCR and Quay to GitHub Container Registry">
    <link rel="icon" href="https://www.docker.com/wp-content/uploads/2022/03/vertical-logo-monochromatic.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="surface border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center">
                    <i class="fab fa-docker text-white text-base"></i>
                </div>
                <h1 class="text-lg font-semibold text-primary">Docker Sync Engine</h1>
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="toggleTheme()" class="w-9 h-9 rounded-xl flex items-center justify-center text-secondary hover:bg-emphasis transition-all duration-300 hover:scale-110 group" title="Toggle Theme" aria-label="Toggle theme">
                    <i id="themeIcon" class="fas fa-sun text-sm text-secondary group-hover:text-amber-400 transition-colors"></i>
                </button>
                
                <a href="https://github.com/freemankevin/dockerhub-mirror" target="_blank" 
                   class="w-9 h-9 rounded-xl flex items-center justify-center text-secondary hover:bg-emphasis transition-all duration-300 hover:scale-110"
                   aria-label="View on GitHub">
                    <i class="fab fa-github text-base"></i>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        
        <!-- Stats Grid -->
        <section class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-3 mb-8" aria-label="Statistics">
            <article class="surface rounded-2xl p-4 stat-card">
                <div class="text-xs text-secondary uppercase tracking-wide font-medium mb-1">Total Mirrors</div>
                <div class="text-2xl font-semibold text-primary mono stat-value" id="statTotal">–</div>
                <div class="mt-1 text-xs accent-green font-medium" id="statSub">loading…</div>
            </article>
            
            <article class="surface rounded-2xl p-4 stat-card">
                <div class="text-xs text-secondary uppercase tracking-wide font-medium mb-1">Storage Space</div>
                <div class="text-2xl font-semibold accent-blue mono stat-value" id="statStorage">–</div>
                <div class="mt-1 text-xs text-secondary">total size</div>
            </article>
            
            <article class="surface rounded-2xl p-4 stat-card">
                <div class="text-xs text-secondary uppercase tracking-wide font-medium mb-1">Avg Image Size</div>
                <div class="text-2xl font-semibold text-primary mono stat-value" id="statAvg">–</div>
                <div class="mt-1 text-xs text-secondary">per image</div>
            </article>
            
            <article class="surface rounded-2xl p-4 stat-card">
                <div class="text-xs text-secondary uppercase tracking-wide font-medium mb-1">Latest Updates</div>
                <div class="text-2xl font-semibold accent-green mono stat-value" id="statLatestCount">–</div>
                <div class="mt-1 text-xs text-secondary">updated this week</div>
            </article>
            
            <article class="surface rounded-2xl p-4 stat-card">
                <div class="text-xs text-secondary uppercase tracking-wide font-medium mb-1">Available Versions</div>
                <div class="text-2xl font-semibold accent-purple mono stat-value" id="statAvgVersions">–</div>
                <div class="mt-1 text-xs text-secondary">per image</div>
            </article>
            
            <article class="surface rounded-2xl p-4 stat-card">
                <div class="text-xs text-secondary uppercase tracking-wide font-medium mb-1">Last Sync</div>
                <div class="text-xl font-semibold text-primary mono" id="statLastSyncAge">–</div>
                <div class="mt-1 text-xs text-secondary truncate" id="statLastSyncName">–</div>
            </article>
        </section>

        <!-- Filter Tabs -->
        <nav class="flex items-center gap-1 flex-wrap border-b border-muted mb-6 pb-2" aria-label="Filter mirrors">
            <button onclick="setFilter('all')" class="filter-tab active" data-filter="all" aria-pressed="true">
                All <span class="ml-1.5 px-1.5 py-0.5 text-xs rounded-full bg-emphasis text-secondary" id="cnt-all">0</span>
            </button>
            <button onclick="setFilter('dockerhub')" class="filter-tab text-secondary" data-filter="dockerhub" aria-pressed="false">
                <i class="fab fa-docker mr-1.5 accent-blue"></i>
                Docker <span class="ml-1.5 px-1.5 py-0.5 text-xs rounded-full bg-emphasis text-secondary" id="cnt-dockerhub">0</span>
            </button>
            <button onclick="setFilter('github')" class="filter-tab text-secondary" data-filter="github" aria-pressed="false">
                <i class="fab fa-github mr-1.5"></i>
                GitHub <span class="ml-1.5 px-1.5 py-0.5 text-xs rounded-full bg-emphasis text-secondary" id="cnt-github">0</span>
            </button>
            <button onclick="setFilter('google')" class="filter-tab text-secondary opacity-50" data-filter="google" aria-pressed="false" disabled>
                <i class="fab fa-google mr-1.5 accent-red"></i>
                Google <span class="ml-1.5 px-1.5 py-0.5 text-xs rounded-full bg-emphasis text-secondary" id="cnt-google">0</span>
            </button>
            <button onclick="setFilter('redhat')" class="filter-tab text-secondary opacity-50" data-filter="redhat" aria-pressed="false" disabled>
                <i class="fab fa-redhat mr-1.5 accent-red"></i>
                Red Hat <span class="ml-1.5 px-1.5 py-0.5 text-xs rounded-full bg-emphasis text-secondary" id="cnt-redhat">0</span>
            </button>
        </nav>

        <!-- Search Box -->
        <div class="mb-6">
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-tertiary" aria-hidden="true"></i>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search mirrors..." 
                    class="w-full pl-10 pr-4 py-2.5 rounded-2xl border transition-all"
                    oninput="handleSearch(this.value)"
                    aria-label="Search mirrors"
                    autocomplete="off">
            </div>
        </div>

        <!-- Mirror List -->
        <div id="mirrorList" class="space-y-3" role="list"></div>
        
        <!-- Pagination -->
        <nav id="pagination" aria-label="Pagination"></nav>

        <!-- Empty State -->
        <div id="emptyState" class="hidden py-20 text-center" role="status">
            <div class="w-12 h-12 rounded-2xl bg-emphasis flex items-center justify-center mx-auto mb-3 border border-default empty-icon">
                <i class="fas fa-search text-lg text-tertiary"></i>
            </div>
            <h3 class="text-sm font-medium text-secondary">No mirrors found</h3>
            <p class="text-xs text-tertiary mt-1">Try adjusting your search or filters</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="border-t border-muted mt-20 py-6">
        <div class="max-w-6xl mx-auto px-6 flex items-center justify-between text-sm text-secondary">
            <span>© 2026 Docker Sync Engine</span>
            <a href="https://github.com/freemankevin/dockerhub-mirror" target="_blank" 
               class="flex items-center gap-2 hover:text-primary transition-colors">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                <span class="mono text-xs">v2.1.0</span>
            </a>
        </div>
    </footer>

    <!-- Toast Container -->
    <div id="toastWrap" class="toast-queue"></div>

    <script src="/js/app.js"></script>
</body>
</html>
